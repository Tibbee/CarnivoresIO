name: Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v' (e.g., v2.0.0)

permissions:
  contents: write

jobs:
  release:
    name: "Build and Release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find Extension Zip
        id: find_zip
        run: |
          # Extract version from tag (e.g., v2.1.0 -> 2.1.0)
          VERSION=${GITHUB_REF_NAME#v}
          
          # Specifically look for the zip matching this version
          ZIP_FILE="public_repo/carnivores_io-${VERSION}.zip"
          
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Error: Zip file $ZIP_FILE not found in public_repo/"
            # Fallback to any zip if the specific one isn't found (safety)
            ZIP_FILE=$(ls public_repo/*.zip | head -n 1)
          fi
          
          if [ -z "$ZIP_FILE" ] || [ ! -f "$ZIP_FILE" ]; then
            echo "Error: No .zip found in public_repo/"
            exit 1
          fi
          
          echo "ZIP_PATH=$ZIP_FILE" >> $GITHUB_ENV
          echo "ZIP_NAME=$(basename $ZIP_FILE)" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
